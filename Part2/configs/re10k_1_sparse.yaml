# Re10k-1 uses the same dl3dv dataset parser (same cameras.json schema).
# Images (256x256) are symlinked into rgb/ by prepare_sparse.py.
# Pixel intrinsics derived from normalized values (fx=0.8573, fy=0.8575, cx=cy=0.5)
# multiplied by image width/height (256).

inherit_from: "~CV-Project4/S3PO-GS/configs/mono/dl3dv/base_config.yaml"

Dataset:
  type: 'dl3dv'
  dataset_path: "~CV-Project4/datasets/Re10k-1"
  begin: 0
  end: -1
  Calibration:
    fx: 219.461
    fy: 219.516
    cx: 128.0
    cy: 128.0
    k1: 0.0
    k2: 0.0
    p1: 0.0
    p2: 0.0
    k3: 0.0
    width: 256
    height: 256
    depth_scale: 200.0
    distorted: False

Results:
  save_dir: "~CV-Project4/Part2/results/"
  color_refinement: True

opt_params:
  position_lr_init: 0.0016
  position_lr_final: 0.0000016
  init_lr: 6

Training:
  mapping_itr_nosingle: 10
  kf_interval: 30
